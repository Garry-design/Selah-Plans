<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reading — Selah Plans</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { background: var(--cream-deep); }

    /* ── Top bar ── */
    .reader-nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(253,250,244,0.92);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border-bottom: 1px solid var(--border-lt);
      z-index: 200;
      display: flex;
      align-items: center;
    }
    .reader-nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      width: 100%;
    }
    .rn-back {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.84rem;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: var(--r-pill);
      transition: all 0.15s;
      border: none;
      background: none;
      font-family: var(--sans);
    }
    .rn-back:hover { background: var(--sand); color: var(--ink); }
    .rn-info { flex: 1; min-width: 0; }
    .rn-plan { font-weight: 700; font-size: 0.88rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rn-day { font-size: 0.75rem; color: var(--muted); }
    .rn-progress {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rn-pct { font-size: 0.78rem; font-weight: 700; color: var(--terra); white-space: nowrap; }
    .rn-prog-bar { width: 80px; }
    .rn-switchers { display: flex; gap: 7px; }
    .rn-select {
      background: var(--sand);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 5px 10px;
      font-size: 0.78rem;
      color: var(--ink-soft);
      font-family: var(--sans);
      outline: none;
      cursor: pointer;
      max-width: 140px;
    }

    /* ── Layout ── */
    .reader-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: calc(var(--nav-h) + 40px) 24px 100px;
    }

    /* ── Day card ── */
    .day-card {
      background: var(--card);
      border: 1px solid var(--border-lt);
      border-radius: var(--r-2xl);
      overflow: hidden;
      box-shadow: var(--sh-md);
      margin-bottom: 24px;
      animation: fadeIn 0.4s var(--ease);
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .day-card-hero {
      padding: 36px 40px 28px;
      border-bottom: 1px solid var(--border-lt);
      background: linear-gradient(160deg, var(--cream) 0%, var(--card) 100%);
    }
    .dc-kicker {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--terra);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dc-kicker::before { content:''; display:block; width:14px; height:1.5px; background:var(--terra); border-radius:var(--r-pill); }
    .dc-title { font-family: var(--serif); font-style: italic; font-size: clamp(1.6rem,4vw,2.3rem); color: var(--ink); margin-bottom: 8px; line-height: 1.2; }
    .dc-reference {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--terra-pale);
      color: var(--terra);
      border: 1px solid var(--terra-border);
      padding: 5px 13px;
      border-radius: var(--r-pill);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-top: 6px;
    }
    .dc-open-bible {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .dc-open-bible a { color: var(--terra); text-decoration: underline; }

    /* Sections */
    .day-section { padding: 28px 40px; border-bottom: 1px solid var(--border-lt); }
    .day-section:last-child { border-bottom: none; }
    .ds-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--terra);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ds-label::after { content:''; flex:1; height:1px; background:var(--border-lt); }
    .reflection-text {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--ink);
      line-height: 1.75;
    }
    .prayer-text {
      font-size: 0.95rem;
      color: var(--ink-soft);
      line-height: 1.85;
      padding: 18px 22px;
      background: var(--sand);
      border-radius: var(--r-lg);
      border-left: 3px solid var(--terra);
    }

    /* Notes */
    .notes-area {
      width: 100%;
      min-height: 96px;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      font-family: var(--sans);
      font-size: 0.9rem;
      color: var(--ink);
      background: var(--cream);
      outline: none;
      resize: vertical;
      line-height: 1.65;
      transition: border-color 0.2s;
    }
    .notes-area:focus { border-color: var(--terra); }
    .notes-saved-msg { font-size: 0.72rem; color: var(--olive); margin-top: 5px; height: 16px; transition: opacity 0.3s; }

    /* Actions */
    .day-actions {
      padding: 24px 40px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .complete-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--terra);
      color: #fff;
      border: none;
      border-radius: var(--r-pill);
      font-size: 0.95rem;
      font-weight: 700;
      font-family: var(--sans);
      cursor: pointer;
      transition: all 0.2s var(--ease);
      box-shadow: 0 4px 14px rgba(176,85,48,0.28);
    }
    .complete-btn:hover { background: var(--terra-lt); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(176,85,48,0.35); }
    .complete-btn.done { background: var(--olive); box-shadow: 0 4px 14px rgba(105,122,88,0.3); }
    .complete-btn.done:hover { background: var(--olive-lt); }

    /* Day dots */
    .day-dots-wrap {
      background: var(--card);
      border: 1px solid var(--border-lt);
      border-radius: var(--r-xl);
      padding: 22px 28px;
      margin-bottom: 20px;
      box-shadow: var(--sh-xs);
    }
    .day-dots-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .day-dots { display: flex; gap: 8px; flex-wrap: wrap; }
    .day-dot {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--cream-deep);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .day-dot:hover { border-color: var(--terra); color: var(--terra); }
    .day-dot.current { border-color: var(--terra); background: var(--terra); color: #fff; box-shadow: 0 2px 8px rgba(176,85,48,0.3); }
    .day-dot.done { border-color: var(--olive); background: var(--olive-pale); color: var(--olive); }

    /* Completed overlay */
    .complete-overlay {
      position: fixed; inset: 0;
      background: rgba(26,23,20,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 800;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      padding: 24px;
    }
    .complete-overlay.show { opacity: 1; pointer-events: all; }
    .complete-modal {
      background: var(--card);
      border-radius: var(--r-2xl);
      padding: 44px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: var(--sh-xl);
      transform: translateY(16px);
      transition: transform 0.35s var(--ease);
    }
    .complete-overlay.show .complete-modal { transform: translateY(0); }
    .complete-icon { font-size: 2.8rem; margin-bottom: 16px; display: block; }
    .complete-title { font-family: var(--serif); font-style: italic; font-size: 1.7rem; color: var(--ink); margin-bottom: 10px; }
    .complete-sub { color: var(--ink-soft); margin-bottom: 28px; line-height: 1.68; font-size: 0.93rem; }

    /* Plan complete */
    .plan-complete {
      background: linear-gradient(145deg, var(--terra) 0%, #8A3D1A 100%);
      color: #fff;
      border-radius: var(--r-2xl);
      padding: 48px 40px;
      text-align: center;
      box-shadow: var(--sh-xl);
    }
    .pc-emoji-big { font-size: 3rem; margin-bottom: 16px; display: block; }
    .pc-title { font-family: var(--serif); font-style: italic; font-size: 2rem; color: #fff; margin-bottom: 12px; }
    .pc-sub { color: rgba(255,255,255,0.7); margin-bottom: 32px; font-size: 0.95rem; line-height: 1.68; }
    .pc-verse { font-family: var(--serif); font-style: italic; font-size: 1rem; color: rgba(255,255,255,0.85); border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; margin-top: 20px; }

    @media (max-width: 640px) {
      .reader-wrap { padding: calc(var(--nav-h) + 20px) 16px 80px; }
      .day-card-hero, .day-section, .day-actions { padding-left: 22px; padding-right: 22px; }
      .rn-switchers { display: none; }
      .day-dots-wrap { padding: 16px 18px; }
      .rn-pct, .rn-prog-bar { display: none; }
    }
  </style>
</head>
<body>

<!-- Reader Nav -->
<nav class="reader-nav">
  <div class="reader-nav-inner">
    <button class="rn-back" onclick="window.location.href='plans.html'">← Plans</button>
    <div class="rn-info">
      <div class="rn-plan" id="rnPlanName">Loading...</div>
      <div class="rn-day" id="rnDayInfo"></div>
    </div>
    <div class="rn-progress">
      <div class="rn-prog-bar"><div class="progress-wrap"><div class="progress-fill" id="rnProg" style="width:0%"></div></div></div>
      <div class="rn-pct" id="rnPct">0%</div>
    </div>
    <div class="rn-switchers">
      <select class="rn-select" id="moodSelect" onchange="changePlanByMood()" title="Switch mood">
        <option value="">Switch mood...</option>
      </select>
    </div>
  </div>
</nav>

<!-- Reader body -->
<div class="reader-wrap" id="readerWrap">
  <div style="text-align:center;padding:80px 24px;color:var(--muted);">
    <div class="spinner" style="margin:0 auto 14px;"></div>
    Loading your plan...
  </div>
</div>

<!-- Completion overlay -->
<div class="complete-overlay" id="completeOverlay">
  <div class="complete-modal">
    <span class="complete-icon" id="completeIcon">✓</span>
    <div class="complete-title" id="completeTitle">Day Complete</div>
    <p class="complete-sub" id="completeSub"></p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="completeNext" onclick="nextDay()">Next Day →</button>
      <button class="btn btn-ghost" onclick="closeComplete()">Stay Here</button>
    </div>
  </div>
</div>

<script src="plans-data.js"></script>
<script>
let plan = null;
let currentDay = 1;
let savedPlans = [];
let savedIdx = -1;
let totalDays = 0;

function getSaved() { try { return JSON.parse(localStorage.getItem('selah_saved')||'[]'); } catch { return []; } }
function setSaved(arr) { localStorage.setItem('selah_saved', JSON.stringify(arr)); }
function markReadToday() {
  const key = new Date().toISOString().split('T')[0];
  let days = []; try { days = JSON.parse(localStorage.getItem('selah_read_days')||'[]'); } catch {}
  if (!days.includes(key)) { days.push(key); localStorage.setItem('selah_read_days', JSON.stringify(days)); }
}

function init() {
  const raw = localStorage.getItem('selah_active_plan');
  if (!raw) { window.location.href = 'plans.html'; return; }
  plan = JSON.parse(raw);
  totalDays = plan.days.length;

  // Find in saved list
  savedPlans = getSaved();
  savedIdx = savedPlans.findIndex(p => p.id === plan.id);
  if (savedIdx === -1) {
    savedPlans.push({ id:plan.id, name:plan.name, moodEmoji:plan.moodEmoji||'📖', moodLabel:plan.moodLabel||'', duration:totalDays, completed:[], source:'builtin', planData:plan.mood==='custom'?plan:undefined, addedAt:Date.now() });
    savedIdx = savedPlans.length - 1;
    setSaved(savedPlans);
  }

  // Determine current day
  const completed = savedPlans[savedIdx].completed || [];
  currentDay = completed.length < totalDays ? completed.length + 1 : 1;

  // Populate mood switcher
  const moodSel = document.getElementById('moodSelect');
  MOODS.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id; opt.textContent = m.emoji + ' ' + m.label;
    moodSel.appendChild(opt);
  });

  renderDay(currentDay);
}

function renderDay(dayNum) {
  currentDay = dayNum;
  const d = plan.days[dayNum - 1];
  if (!d) { renderPlanComplete(); return; }

  const completed = savedPlans[savedIdx]?.completed || [];
  const isDone = completed.includes(dayNum);
  const pct = Math.round(completed.length / totalDays * 100);
  const notes = getNotes(dayNum);

  // Update nav
  document.getElementById('rnPlanName').textContent = plan.name;
  document.getElementById('rnDayInfo').textContent = `Day ${dayNum} of ${totalDays}`;
  document.getElementById('rnProg').style.width = pct + '%';
  document.getElementById('rnPct').textContent = pct + '%';

  const wrap = document.getElementById('readerWrap');
  wrap.innerHTML = `
    <!-- Dots -->
    <div class="day-dots-wrap">
      <div class="day-dots-label">Your Journey</div>
      <div class="day-dots">
        ${plan.days.map((_, i) => {
          const n = i+1;
          const dc = completed.includes(n) ? 'done' : (n===dayNum ? 'current' : '');
          return `<div class="day-dot ${dc}" onclick="renderDay(${n})" title="Day ${n}">${completed.includes(n)?'✓':n}</div>`;
        }).join('')}
      </div>
    </div>

    <!-- Main card -->
    <div class="day-card">
      <!-- Hero -->
      <div class="day-card-hero">
        <div class="dc-kicker">${plan.moodEmoji||'📖'} Day ${dayNum} of ${totalDays} · ${plan.name}</div>
        <div class="dc-title">${d.title}</div>
        <div class="dc-reference">📖 ${d.reference}</div>
        <div class="dc-open-bible">Open in: <a href="https://www.biblegateway.com/passage/?search=${encodeURIComponent(d.reference)}&version=NIV" target="_blank" rel="noopener">Bible Gateway ↗</a></div>
      </div>

      <!-- Reflection -->
      <div class="day-section">
        <div class="ds-label">Reflection</div>
        <div class="reflection-text">${d.reflection}</div>
      </div>

      <!-- Prayer -->
      <div class="day-section">
        <div class="ds-label">Prayer</div>
        <div class="prayer-text">${d.prayer}</div>
      </div>

      <!-- Notes -->
      <div class="day-section">
        <div class="ds-label">Notes <span style="color:var(--muted);font-size:0.68rem;text-transform:none;letter-spacing:0;">(optional — saved locally)</span></div>
        <textarea class="notes-area" id="notesArea" placeholder="What stood out? What did God say to you today?" oninput="saveNotes(${dayNum}, this.value)">${notes}</textarea>
        <div class="notes-saved-msg" id="notesSavedMsg"></div>
      </div>

      <!-- Actions -->
      <div class="day-actions">
        ${dayNum > 1 ? `<button class="btn btn-ghost" onclick="renderDay(${dayNum-1})">← Previous</button>` : ''}
        <button class="complete-btn ${isDone?'done':''}" id="completeBtn" onclick="markComplete(${dayNum})">
          ${isDone ? '✓ Completed' : '✓ Mark Complete'}
        </button>
        ${dayNum < totalDays ? `<button class="btn btn-secondary" onclick="renderDay(${dayNum+1})">Next Day →</button>` : ''}
      </div>
    </div>
  `;
}

function getNotes(dayNum) {
  try { const n = JSON.parse(localStorage.getItem('selah_notes_'+plan.id)||'{}'); return n[dayNum]||''; } catch { return ''; }
}
let _noteTimer;
function saveNotes(dayNum, val) {
  clearTimeout(_noteTimer);
  _noteTimer = setTimeout(() => {
    try {
      const key = 'selah_notes_' + plan.id;
      const n = JSON.parse(localStorage.getItem(key)||'{}');
      n[dayNum] = val; localStorage.setItem(key, JSON.stringify(n));
      const msg = document.getElementById('notesSavedMsg');
      if (msg) { msg.textContent = 'Saved'; msg.style.opacity='1'; setTimeout(()=>{ if(msg)msg.style.opacity='0'; },1500); }
    } catch {}
  }, 600);
}

function markComplete(dayNum) {
  savedPlans = getSaved();
  savedIdx = savedPlans.findIndex(p => p.id === plan.id);
  if (savedIdx === -1) return;

  const completed = savedPlans[savedIdx].completed || [];
  if (!completed.includes(dayNum)) {
    completed.push(dayNum);
    savedPlans[savedIdx].completed = completed;
    setSaved(savedPlans);
    markReadToday();
  }

  const btn = document.getElementById('completeBtn');
  if (btn) { btn.classList.add('done'); btn.textContent = '✓ Completed'; }

  // Update dot
  const dot = document.querySelector(`.day-dot:nth-child(${dayNum})`);
  if (dot) { dot.classList.add('done'); dot.classList.remove('current'); dot.textContent = '✓'; }

  // Re-render nav pct
  const pct = Math.round(completed.length / totalDays * 100);
  document.getElementById('rnProg').style.width = pct + '%';
  document.getElementById('rnPct').textContent = pct + '%';

  // Show overlay
  if (completed.length >= totalDays) {
    showPlanComplete();
  } else {
    showDayComplete(dayNum, completed.length);
  }
}

function showDayComplete(dayNum, doneCount) {
  const nextDay = dayNum + 1;
  const nextTitle = plan.days[nextDay-1]?.title || '';
  document.getElementById('completeIcon').textContent = '✓';
  document.getElementById('completeTitle').textContent = 'Day ' + dayNum + ' Complete';
  document.getElementById('completeSub').textContent = doneCount + ' of ' + totalDays + ' days done.' + (nextTitle ? ' Up next: ' + nextTitle + '.' : '');
  document.getElementById('completeNext').style.display = nextDay <= totalDays ? '' : 'none';
  document.getElementById('completeNext').onclick = () => { closeComplete(); renderDay(nextDay); };
  document.getElementById('completeOverlay').classList.add('show');
}
function showPlanComplete() {
  renderPlanComplete();
}
function closeComplete() {
  document.getElementById('completeOverlay').classList.remove('show');
}

function renderPlanComplete() {
  document.getElementById('rnPlanName').textContent = plan.name;
  document.getElementById('rnDayInfo').textContent = 'Plan Complete!';
  document.getElementById('rnProg').style.width = '100%';
  document.getElementById('rnPct').textContent = '100%';

  const votd = getVerseOfTheDay();
  document.getElementById('readerWrap').innerHTML = `
    <div class="plan-complete">
      <span class="pc-emoji-big">✦</span>
      <div class="pc-title">${plan.name} — Complete</div>
      <p class="pc-sub">You finished all ${totalDays} days. Well done for showing up, reading, reflecting, and praying. That faithfulness matters.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a href="plans.html" class="btn btn-dark btn-lg">Browse More Plans</a>
      </div>
      <div class="pc-verse">"${votd.text}"<br><span style="font-size:0.8rem;font-style:normal;font-weight:700;opacity:0.65;">${votd.ref}</span></div>
    </div>
  `;
}

function nextDay() {
  closeComplete();
  if (currentDay < totalDays) renderDay(currentDay + 1);
}

function changePlanByMood() {
  const mood = document.getElementById('moodSelect').value;
  if (!mood) return;
  window.location.href = 'plans.html?mood=' + mood;
}

init();
</script>
</body>
</html>
